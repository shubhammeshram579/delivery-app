services:

  postgres:
    image: postgres:15-alpine
    container_name: delivery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: delivery_app
      POSTGRES_USER: postgres
      # POSTGRES_PASSWORD: postgres
      POSTGRES_PASSWORD: labham
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      # test: ['CMD-SHELL', 'pg_isready -U postgres']
      test: ['CMD-SHELL', 'pg_isready -U postgres -d delivery_app']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - delivery_network

  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - delivery_network

  server:
    build:
      context: ./server
      dockerfile: ./Dockerfile
    container_name: delivery_server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:labham@postgres:5432/delivery_app
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_min_64_chars_long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_in_production}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      CLIENT_URL: http://localhost:3000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@deliveryapp.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    volumes:
      - ./server:/app
      - server_modules:/app/node_modules
      - ./server/logs:/app/logs
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery_network
    working_dir: /app

  client:
    build:
      context: ./client
      dockerfile: ./Dockerfile
    container_name: delivery_client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - ./client:/app
      - client_modules:/app/node_modules
      - client_next:/app/.next
    ports:
      - '3000:3000'
    depends_on:
      - server
    networks:
      - delivery_network

volumes:
  postgres_data:
  redis_data:
  server_modules:
  client_modules:
  client_next:

networks:
  delivery_network:
    driver: bridge
